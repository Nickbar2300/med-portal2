<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connecting Medicare — MedRecord Portal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #161b22;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 40px 44px;
      width: 420px;
      max-width: 95vw;
      text-align: center;
    }
    .logo-icon {
      width: 48px; height: 48px;
      background: #1f6feb;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .logo-icon svg { width: 26px; height: 26px; fill: white; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .sub { font-size: 14px; color: #8b949e; margin-bottom: 28px; line-height: 1.6; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #1f6feb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      font-size: 13px;
      color: #8b949e;
      margin-top: 12px;
    }
    .success-icon {
      width: 48px; height: 48px;
      background: rgba(63,185,80,0.15);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .success-icon svg { width: 24px; height: 24px; fill: #3fb950; }
    .error-icon {
      width: 48px; height: 48px;
      background: rgba(248,81,73,0.15);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .error-icon svg { width: 24px; height: 24px; fill: #f85149; }
    .btn {
      display: inline-block;
      margin-top: 20px;
      background: #1f6feb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      font-family: inherit;
    }
    .btn:hover { background: #388bfd; }
    .code-box {
      background: #0d1117;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 12px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: #3fb950;
      word-break: break-all;
      text-align: left;
      margin-top: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-icon" id="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
    </div>
    <div class="success-icon" id="success-icon">
      <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
    </div>
    <div class="error-icon" id="error-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
    </div>

    <h1 id="title">Connecting to Medicare</h1>
    <p class="sub" id="subtitle">Please wait while we securely connect your Medicare account to MedRecord Portal.</p>

    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">Receiving authorization from CMS Blue Button...</div>

    <div class="code-box" id="code-box"></div>
    <div id="action"></div>
  </div>

  <script>
    const PORTAL_URL     = 'https://glowing-pavlova-dea557.netlify.app/';
    const TOKEN_FUNCTION = '/.netlify/functions/token-exchange';
    const REDIRECT_URI   = 'https://glowing-pavlova-dea557.netlify.app/callback.html';

    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function showError(msg) {
      document.getElementById('logo-icon').style.display = 'none';
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('error-icon').style.display = 'flex';
      document.getElementById('title').textContent = 'Connection failed';
      document.getElementById('subtitle').textContent = msg;
      document.getElementById('status').textContent = '';
      document.getElementById('action').innerHTML =
        '<a class="btn" href="' + PORTAL_URL + '">Return to portal</a>';
    }

    function showSuccess(token) {
      document.getElementById('logo-icon').style.display = 'none';
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('error-icon').style.display = 'none';
      document.getElementById('success-icon').style.display = 'flex';
      document.getElementById('title').textContent = 'Medicare connected!';
      document.getElementById('subtitle').textContent = 'Your access token has been retrieved. Redirecting you back to the portal...';
      document.getElementById('status').textContent = '';
      const box = document.getElementById('code-box');
      box.style.display = 'block';
      box.textContent = 'Access token: ' + token.substring(0, 24) + '...';
      document.getElementById('action').innerHTML =
        '<a class="btn" href="' + PORTAL_URL + '">Return to portal</a>';
      setTimeout(() => { window.location.href = PORTAL_URL + '?autologin=1'; }, 2000);
    }

    async function exchangeToken(code) {
      const codeVerifier = sessionStorage.getItem('bb2_code_verifier');
      if (!codeVerifier) {
        showError('Missing code verifier — your browser session may have reset during the redirect. Please return to the portal and try connecting again.');
        return;
      }
      document.getElementById('status').textContent = 'Exchanging authorization code for access token...';
      try {
        const response = await fetch(TOKEN_FUNCTION, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, code_verifier: codeVerifier, redirect_uri: REDIRECT_URI }),
        });
        const data = await response.json();
        if (!response.ok || data.error) {
          showError('Token exchange failed: ' + (data.error || response.status) + ' — ' + (data.details ? JSON.stringify(data.details) : 'No details returned'));
          return;
        }
        sessionStorage.setItem('bb2_access_token', data.access_token);
        sessionStorage.setItem('bb2_token_type',   data.token_type);
        sessionStorage.setItem('bb2_scope',        data.scope || '');
        sessionStorage.setItem('bb2_connected',    'true');
        sessionStorage.setItem('portal_authed',    'true');
        sessionStorage.removeItem('bb2_code_verifier');
        sessionStorage.setItem('portal_authed', 'true');
        showSuccess(data.access_token);
      } catch (err) {
        showError('Network error during token exchange: ' + err.message);
      }
    }

    // Main logic
    const code  = getParam('code');
    const error = getParam('error');

    if (error) {
      showError('Medicare authorization was denied: ' + error);
    } else if (code) {
      document.getElementById('status').textContent = 'Authorization code received...';
      exchangeToken(code);
    } else {
      showError('No authorization code returned. Please try connecting again from the portal.');
    }
  </script>
</body>
</html>
